<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Sổ Lớp THPT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Chelsea+Market&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>SỔ LỚP THPT</h2>
                <p>Dành cho giáo viên chủ nhiệm cấp 3</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email đăng nhập</label>
                    <input type="email" id="email" required placeholder="gvcn@gmail.com">
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" required placeholder="123">
                </div>

                <button type="submit" class="btn-login">Đăng Nhập</button>
                <p id="authError" class="error-msg"></p>
            </form>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
